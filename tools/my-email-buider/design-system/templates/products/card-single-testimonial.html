<!-- COMPONENT: products/card-single-testimonial | PRODUCT LEFT + REVIEW RIGHT
TOKENS:
  {{PRODUCT_IMAGE_URL}} — 4:5 product photo (340×425px display, 680×850px source min)
  {{PRODUCT_LABEL}}
  {{PRODUCT_NAME}}      — Lust font — SENTENCE CASE
  {{PRODUCT_OCCASION}}
  {{PRODUCT_PRICE}}
  {{PRODUCT_URL}}
  {{REVIEW_STARS}}      — e.g. "★★★★★" (use actual star characters)
  {{REVIEW_TEXT}}       — quote text, no quote marks needed
  {{REVIEWER_NAME}}     — e.g. "Sarah M., Sydney"
RULES:
  - No quote mark — stars sit above quote text
  - Face2 illustration is locked (bottom-right of testimonial col, 30% height)
  - Product image MUST be 4:5 ratio
-->
<tr><td style="border-top:1px solid #e8e2da;">
<table width="600" cellpadding="0" cellspacing="0" border="0">
  <tr>
    <!-- Product column — 340px -->
    <td class="ptimg" width="340" valign="top" style="width:340px;border-right:1px solid #e8e2da;vertical-align:top;">
      <img src="{{PRODUCT_IMAGE_URL}}" width="340" height="425" alt="{{PRODUCT_NAME}}"
           style="display:block;width:340px;height:425px;object-fit:cover;object-position:center top;">
      <table width="340" cellpadding="0" cellspacing="0" border="0">
        <tr>
          <td style="padding:28px;">
            <p style="font-family:'NeuzeitGro','Gill Sans','Gill Sans MT',Calibri,sans-serif;font-weight:700;font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:#aaaaaa;margin:0 0 8px 0;">{{PRODUCT_LABEL}}</p>
            <h3 class="pn" style="font-family:'Lust',Georgia,'Times New Roman',serif;font-weight:normal;font-style:normal;font-size:22px;color:#000000;line-height:1.15;margin:0 0 8px 0;">{{PRODUCT_NAME}}</h3>
            <p style="font-family:'NeuzeitGro','Gill Sans','Gill Sans MT',Calibri,sans-serif;font-weight:300;font-size:12px;color:#666666;line-height:1.6;margin:0 0 14px 0;font-style:italic;">{{PRODUCT_OCCASION}}</p>
            <p style="font-family:'NeuzeitGro','Gill Sans','Gill Sans MT',Calibri,sans-serif;font-weight:700;font-size:13px;color:#000000;margin:0 0 20px 0;">{{PRODUCT_PRICE}}</p>
            <a href="{{PRODUCT_URL}}" style="font-family:'NeuzeitGro','Gill Sans','Gill Sans MT',Calibri,sans-serif;font-weight:700;font-size:9px;letter-spacing:.16em;text-transform:uppercase;background:#000000;color:#ffffff;text-decoration:none;padding:10px 24px;display:inline-block;">SHOP NOW</a>
          </td>
        </tr>
      </table>
    </td>
    <!-- Testimonial column — 260px, 50% Clay bg -->
    <td class="pttesti" valign="middle" style="background:#EBE5DF;padding:36px 28px;text-align:center;vertical-align:middle;position:relative;overflow:hidden;">
      <!-- Face2 illustration — bottom-right, 30% height, locked -->
      <img src="{{ASSETS_BASE}}/Face2_Black.png" alt="" style="position:absolute;right:-30px;bottom:-30px;height:calc(30% + 30px);width:auto;opacity:0.12;display:block;">
      <p style="font-family:'NeuzeitGro','Gill Sans','Gill Sans MT',Calibri,sans-serif;font-weight:700;font-size:14px;color:#C8A888;letter-spacing:.08em;margin:0 0 18px 0;position:relative;z-index:1;">{{REVIEW_STARS}}</p>
      <p style="font-family:'NeuzeitGro','Gill Sans','Gill Sans MT',Calibri,sans-serif;font-weight:300;font-size:13px;color:#333333;font-style:italic;line-height:1.8;margin:0 0 16px 0;position:relative;z-index:1;">{{REVIEW_TEXT}}</p>
      <cite style="font-family:'NeuzeitGro','Gill Sans','Gill Sans MT',Calibri,sans-serif;font-weight:700;font-size:10px;letter-spacing:.08em;color:#999999;font-style:normal;display:block;position:relative;z-index:1;">— {{REVIEWER_NAME}}</cite>
    </td>
  </tr>
</table>
</td></tr>

<!-- TEMPLATE: T8 — Comparison / Poll | two stacked photos + script label
TOKENS:
  {{PHOTO_TOP}}     — top photo (file:// or https)
  {{PHOTO_BOTTOM}}  — bottom photo (file:// or https)
  {{LABEL}}         — Cervanttis script label across the seam (e.g. "this or that?")
  STYLE PRESET (copy ONE row from manifest.json → t8_label_presets):
  {{BAR_BG}} {{BAR_INK}}
RULES:
  - Two equal photo halves; a centred label bar with thin rules straddles the seam (the "this or that?" look).
  - label_style is locked to Cervanttis script. Reflows: halves stay 50/50 in both ratios.
-->
<div class="fill" style="position:absolute;inset:0;display:flex;flex-direction:column;">
  <div class="ph-top" style="flex:1 1 50%;background-image:url('{{PHOTO_TOP}}');background-size:cover;background-position:center;"></div>
  <div class="ph-bottom" style="flex:1 1 50%;background-image:url('{{PHOTO_BOTTOM}}');background-size:cover;background-position:center;"></div>
  <div class="label-wrap" style="position:absolute;left:0;right:0;top:50%;transform:translateY(-50%);display:flex;justify-content:center;">
    <div class="label-bar" style="background:{{BAR_BG}};padding:24px 72px;display:flex;align-items:center;gap:36px;">
      <span style="display:block;width:60px;height:2px;background:{{BAR_INK}};opacity:.5;"></span>
      <span class="label" style="font-family:'Cervanttis','Palatino Linotype',Palatino,Georgia,serif;font-weight:400;font-synthesis:none;font-size:88px;line-height:1;color:{{BAR_INK}};">{{LABEL}}</span>
      <span style="display:block;width:60px;height:2px;background:{{BAR_INK}};opacity:.5;"></span>
    </div>
  </div>
</div>

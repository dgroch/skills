<!-- COMPONENT: blocks/offer-panel | DESIGNED BLOCK — BOLD OFFER / PROMO HERO + DASHED CODE + ACCENT TAG
TOKENS:
  {{SUPER_LABEL}}    — NeuzeitGro Bold caps micro-label (e.g. "FLASH SALE", "BLACK FRIDAY")
  {{OFFER_VALUE}}    — Lust display offer, written as it reads (e.g. "20% off", "Free shipping",
                       "Free soap with $100+"). The hero line — renders very large.
  {{HEADLINE}}       — Lust supporting line — SENTENCE CASE (e.g. "Our biggest sale of the year.")
  {{SUBHEADLINE}}    — NeuzeitGro Light terms / eligibility (e.g. "Valid on orders over $200. Ends Sunday.")
  {{ACCENT_RIBBON}}  — Cervanttis script tag — MUST be lowercase (e.g. "ends tonight"). "" to hide the tag.
  {{CODE_LABEL}}     — NeuzeitGro Bold caps (e.g. "USE CODE"). Shown above the code box.
  {{PROMO_CODE}}     — the code in the dashed box (e.g. "BLOOM20"). "" hides the whole code box
                       (use "" for no-code offers / giveaways — see GIVEAWAY MODE below).
  {{CTA_TEXT}}       — button label
  {{CTA_URL}}        — button href
  PALETTE TOKENS (copy ONE preset row verbatim — never invent hex):
  {{PANEL_BG}} {{PANEL_TEXT}} {{PANEL_SUB}} {{PANEL_BORDER}}
RULES:
  - DESIGNED BLOCK: slice to PNG (or GIF for a sale/urgency flash — SKILL Step 5e). The rotated
    Cervanttis ribbon (transform:rotate) and the big web-font display value do not survive as
    live email HTML — this block must be rasterised.
  - This is the BOLD, designed offer HERO. For a small inline code at the bottom of a normal
    email, keep using the sections/promo-code component instead.
  - ACCENT_RIBBON is Cervanttis → lowercase; HEADLINE is Lust → sentence case.
  - Square black/white button only. One offer-panel per email.
  - GIVEAWAY MODE: set PROMO_CODE="" (hides the code box), put the prize in OFFER_VALUE
    (e.g. "Win $200"), the mechanic in SUBHEADLINE, and "enter now" in CTA_TEXT.
PALETTE PRESETS (copy one row verbatim into the four PANEL_* tokens):
  white :  PANEL_BG=#ffffff  PANEL_TEXT=#444444  PANEL_SUB=#aaaaaa  PANEL_BORDER=#e8e2da
  clay  :  PANEL_BG=#D8CCBE  PANEL_TEXT=#000000  PANEL_SUB=#5f574d  PANEL_BORDER=#c7b9a9
  50clay:  PANEL_BG=#EBE5DF  PANEL_TEXT=#666666  PANEL_SUB=#8a8178  PANEL_BORDER=#ded7cf
  noir  :  PANEL_BG=#000000  PANEL_TEXT=#cfcac3  PANEL_SUB=#888888  PANEL_BORDER=#2c2825   (swap button to #fff/#000)
  SUPER_LABEL, OFFER_VALUE, HEADLINE and the code render in the brand extreme: #000000 on light
  presets, #ffffff on the noir preset. A seasonal campaign accent (per design-system.md) may
  replace PANEL_BG on occasion/promo sends only — never on type.
-->
<tr><td style="padding:0;background:{{PANEL_BG}};border-top:1px solid {{PANEL_BORDER}};">
<table width="600" cellpadding="0" cellspacing="0" border="0">
  <tr>
    <td style="padding:52px 50px 54px;text-align:center;background:{{PANEL_BG}};">
      <!-- rotated Cervanttis accent tag (the designed 'sticker') -->
      <div style="height:0;line-height:0;">
        <span style="display:inline-block;position:relative;top:-14px;left:150px;background:#000000;color:#ffffff;font-family:'Cervanttis','Palatino Linotype',Palatino,Georgia,serif;font-weight:400;font-style:normal;font-synthesis:none;-webkit-font-smoothing:antialiased;font-size:20px;line-height:1.0;padding:6px 16px;transform:rotate(-7deg);box-shadow:0 6px 16px rgba(0,0,0,0.22);">{{ACCENT_RIBBON}}</span>
      </div>
      <p style="font-family:'NeuzeitGro','Gill Sans','Gill Sans MT',Calibri,sans-serif;font-weight:700;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:{{PANEL_SUB}};margin:0 0 14px 0;">{{SUPER_LABEL}}</p>
      <p style="font-family:'Lust',Georgia,'Times New Roman',serif;font-weight:normal;font-style:normal;font-size:60px;color:#000000;line-height:1.0;margin:0 0 14px 0;">{{OFFER_VALUE}}</p>
      <h2 style="font-family:'Lust',Georgia,'Times New Roman',serif;font-weight:normal;font-style:normal;font-size:24px;color:#000000;line-height:1.2;margin:0 0 12px 0;">{{HEADLINE}}</h2>
      <p style="font-family:'NeuzeitGro','Gill Sans','Gill Sans MT',Calibri,sans-serif;font-weight:300;font-size:13px;color:{{PANEL_TEXT}};line-height:1.6;max-width:380px;margin:0 auto 24px auto;">{{SUBHEADLINE}}</p>
      <!-- dashed promo-code box (per design-system.md promo styling) -->
      <p style="font-family:'NeuzeitGro','Gill Sans','Gill Sans MT',Calibri,sans-serif;font-weight:700;font-size:9px;letter-spacing:.20em;text-transform:uppercase;color:{{PANEL_SUB}};margin:0 0 8px 0;">{{CODE_LABEL}}</p>
      <div style="display:inline-block;border:2px dashed #000000;padding:12px 32px;margin:0 0 26px 0;">
        <span style="font-family:'Lust',Georgia,'Times New Roman',serif;font-weight:normal;font-style:normal;font-size:20px;letter-spacing:.08em;color:#000000;">{{PROMO_CODE}}</span>
      </div>
      <div>
        <a href="{{CTA_URL}}" style="font-family:'NeuzeitGro','Gill Sans','Gill Sans MT',Calibri,sans-serif;font-weight:700;font-size:10px;letter-spacing:.16em;text-transform:uppercase;background:#000000;color:#ffffff;text-decoration:none;padding:14px 40px;display:inline-block;">{{CTA_TEXT}}</a>
      </div>
    </td>
  </tr>
</table>
</td></tr>

<!-- COMPONENT: blocks/image-text | DESIGNED BLOCK — 2/3 IMAGE + TEXT & BUTTON (IMAGE LEFT/RIGHT)
TOKENS:
  {{IMAGE_URL}}   — 2/3-width lifestyle/product photo (400×500px display, 800×1000px source min)
  {{IMG_SIDE}}    — IMG_SIDE lever: "left" or "right" — which side the image sits. Locked to these two.
  {{SUPER_LABEL}} — NeuzeitGro Bold caps micro-label (e.g. "NEW THIS WEEK")
  {{HEADLINE}}    — Lust display headline — SENTENCE CASE
  {{BODY}}        — NeuzeitGro Light supporting paragraph
  {{CTA_TEXT}}    — button label
  {{CTA_URL}}     — button href
  PALETTE TOKENS (fill ALL FOUR by copying ONE preset row verbatim — never invent hex):
  {{PANEL_BG}} {{PANEL_TEXT}} {{PANEL_SUB}} {{PANEL_BORDER}}
RULES:
  - DESIGNED BLOCK: slice to PNG. The 2/3 + 1/3 split and the IMG_SIDE flip rely on CSS that is
    rasterised, so it need not survive as live email HTML.
  - IMG_SIDE is the only layout lever: "left" (image left, text right) or "right" (image right,
    text left). It just flips which side the image sits — nothing else changes.
  - HEADLINE is Lust → sentence case. Square black button only; on the NOIR preset swap to white-on-black.
  - 600px wide: image column 400px (2/3), text column 200px (1/3), variable height. One per email.
PALETTE PRESETS (copy one row verbatim into the four PANEL_* tokens):
  white :  PANEL_BG=#ffffff  PANEL_TEXT=#444444  PANEL_SUB=#aaaaaa  PANEL_BORDER=#e8e2da
  clay  :  PANEL_BG=#D8CCBE  PANEL_TEXT=#000000  PANEL_SUB=#5f574d  PANEL_BORDER=#c7b9a9
  50clay:  PANEL_BG=#EBE5DF  PANEL_TEXT=#444444  PANEL_SUB=#8a8178  PANEL_BORDER=#ded7cf
  noir  :  PANEL_BG=#000000  PANEL_TEXT=#cfcac3  PANEL_SUB=#888888  PANEL_BORDER=#2c2825
-->
<tr><td style="padding:0;background:{{PANEL_BG}};border-top:1px solid {{PANEL_BORDER}};">
<style>
  /* IMG_SIDE toggle: rasterised block, so reorder the two cells with direction (Chromium). */
  .it.side-right { direction:rtl; }
  .it.side-right td { direction:ltr; }
</style>
<table width="600" cellpadding="0" cellspacing="0" border="0" class="it side-{{IMG_SIDE}}">
  <tr>
    <!-- Image column (2/3) -->
    <td width="400" valign="middle" style="width:400px;padding:0;overflow:hidden;line-height:0;font-size:0;vertical-align:middle;">
      <img src="{{IMAGE_URL}}" width="400" height="500" alt="{{HEADLINE}}" style="display:block;width:400px;height:500px;object-fit:cover;object-position:center;">
    </td>
    <!-- Text column (1/3) -->
    <td valign="middle" style="padding:36px 32px;vertical-align:middle;text-align:left;">
      <p style="font-family:'NeuzeitGro','Gill Sans','Gill Sans MT',Calibri,sans-serif;font-weight:700;font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:{{PANEL_SUB}};margin:0 0 12px 0;">{{SUPER_LABEL}}</p>
      <h2 style="font-family:'Lust',Georgia,'Times New Roman',serif;font-weight:normal;font-style:normal;font-size:24px;color:{{PANEL_TEXT}};line-height:1.18;margin:0 0 14px 0;">{{HEADLINE}}</h2>
      <p style="font-family:'NeuzeitGro','Gill Sans','Gill Sans MT',Calibri,sans-serif;font-weight:300;font-size:13px;color:{{PANEL_TEXT}};line-height:1.7;margin:0 0 22px 0;">{{BODY}}</p>
      <a href="{{CTA_URL}}" style="font-family:'NeuzeitGro','Gill Sans','Gill Sans MT',Calibri,sans-serif;font-weight:700;font-size:10px;letter-spacing:.16em;text-transform:uppercase;background:#000000;color:#ffffff;text-decoration:none;padding:13px 32px;display:inline-block;">{{CTA_TEXT}}</a>
    </td>
  </tr>
</table>
</td></tr>

<!-- COMPONENT: blocks/journal-tile | LIVE HTML — "FROM THE JOURNAL" STACK (2–3 LINKED ARTICLE TILES)
TOKENS:
  {{SECTION_LABEL}}     — NeuzeitGro Bold caps micro-label (e.g. "FROM THE JOURNAL")
  {{SECTION_HEADLINE}}  — Lust display — SENTENCE CASE (e.g. "More from Kellie")
  {{TILE_1_IMAGE_URL}}  — tile 1 photo (4:5 crop, 200×250px display)
  {{TILE_1_EYEBROW}}    — NeuzeitGro caps micro-label (e.g. "KELLIE")
  {{TILE_1_TITLE}}      — Lust display — SENTENCE CASE (post title, ~6 words)
  {{TILE_1_TEASER}}     — NeuzeitGro Light teaser (~12 words)
  {{TILE_1_LINK_URL}}   — tile 1 post URL
  {{TILE_2_IMAGE_URL}}  — tile 2 photo (4:5 crop)
  {{TILE_2_EYEBROW}}    — NeuzeitGro caps micro-label
  {{TILE_2_TITLE}}      — Lust display — SENTENCE CASE
  {{TILE_2_TEASER}}     — NeuzeitGro Light teaser
  {{TILE_2_LINK_URL}}   — tile 2 post URL
  {{TILE_3_IMAGE_URL}}  — tile 3 photo (4:5 crop) — OPTIONAL: set "" to render a 2-up stack
  {{TILE_3_EYEBROW}}    — OPTIONAL ("")
  {{TILE_3_TITLE}}      — OPTIONAL ("")
  {{TILE_3_TEASER}}     — OPTIONAL ("")
  {{TILE_3_LINK_URL}}   — OPTIONAL ("")
RULES:
  - LIVE HTML (not a designed/sliced block): each tile is its own <a href> so all 2–3 links work
    in the Klaviyo push. Listed in manifest assembly.html_only_components.
  - Web-safe fonts only (emails can't load brand fonts on live HTML): title → Georgia serif,
    eyebrow/teaser → 'Gill Sans','Gill Sans MT',Calibri,Arial,sans-serif. (Preview shows brand
    fonts via {{ASSETS_BASE}} @font-face; inbox falls back — accepted.)
  - TITLE is sentence case. EYEBROW renders uppercase via CSS.
  - Tiles are STACKED vertically: each is a white card with the image on the LEFT and the text on
    the RIGHT. On mobile each card collapses to image-over-text (.jt-img / .jt-txt in the shell
    @media (max-width:600px) block).
  - Clay (#D8CCBE) section band so the module CONTRASTS with the dark email body (#2c2825);
    white tile cards with hairline #e8e2da borders; square corners.
  - Tile 3 is wrapped in {{#TILE_3_IMAGE_URL}} … {{/TILE_3_IMAGE_URL}} — the assembler's
    conditional-section pass drops it when the URL is empty (2-up stack).
  - No price, no PANEL_* palette tokens — keep it lean.
-->
<tr><td style="padding:0;background:#D8CCBE;">
  <table width="600" cellpadding="0" cellspacing="0" border="0" align="center" class="jt">
    <tr><td style="padding:42px 28px 20px;text-align:center;">
      <p style="font-family:'Gill Sans','Gill Sans MT',Calibri,Arial,sans-serif;font-weight:700;font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:#6f6354;margin:0 0 10px;">{{SECTION_LABEL}}</p>
      <p style="font-family:Georgia,'Times New Roman',serif;font-weight:normal;font-size:26px;color:#2c2825;line-height:1.25;margin:0;">{{SECTION_HEADLINE}}</p>
    </td></tr>
    <!-- TILE 1 -->
    <tr><td class="jt-row" style="padding:7px 28px;">
      <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background:#ffffff;border:1px solid #e8e2da;"><tr>
        <td class="jt-img" width="200" valign="top" style="width:200px;padding:0;overflow:hidden;vertical-align:top;">
          <a href="{{TILE_1_LINK_URL}}" style="display:block;text-decoration:none;">
            <img src="{{TILE_1_IMAGE_URL}}" width="200" height="250" alt="" style="display:block;width:200px;height:250px;object-fit:cover;object-position:center top;border:0;">
          </a>
        </td>
        <td class="jt-txt" valign="top" style="padding:0;height:250px;vertical-align:top;">
          <a class="jt-txt-link" href="{{TILE_1_LINK_URL}}" style="display:block;box-sizing:border-box;height:250px;padding:22px 26px;text-decoration:none;">
            <span style="display:block;text-decoration:none;font-family:'Gill Sans','Gill Sans MT',Calibri,Arial,sans-serif;font-weight:700;font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:#9a948c;margin:0 0 7px;">{{TILE_1_EYEBROW}}</span>
            <span style="display:block;text-decoration:none;font-family:Georgia,'Times New Roman',serif;font-size:19px;color:#2c2825;line-height:1.3;margin:0 0 8px;">{{TILE_1_TITLE}}</span>
            <span style="display:block;text-decoration:none;font-family:'Gill Sans','Gill Sans MT',Calibri,Arial,sans-serif;font-size:12px;color:#6b655e;line-height:1.55;margin:0 0 12px;">{{TILE_1_TEASER}}</span>
            <span style="text-decoration:none;font-family:'Gill Sans','Gill Sans MT',Calibri,Arial,sans-serif;font-weight:700;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#2c2825;">Read the piece &rarr;</span>
          </a>
        </td>
      </tr></table>
    </td></tr>
    <!-- TILE 2 -->
    <tr><td class="jt-row" style="padding:7px 28px;">
      <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background:#ffffff;border:1px solid #e8e2da;"><tr>
        <td class="jt-img" width="200" valign="top" style="width:200px;padding:0;overflow:hidden;vertical-align:top;">
          <a href="{{TILE_2_LINK_URL}}" style="display:block;text-decoration:none;">
            <img src="{{TILE_2_IMAGE_URL}}" width="200" height="250" alt="" style="display:block;width:200px;height:250px;object-fit:cover;object-position:center top;border:0;">
          </a>
        </td>
        <td class="jt-txt" valign="top" style="padding:0;height:250px;vertical-align:top;">
          <a class="jt-txt-link" href="{{TILE_2_LINK_URL}}" style="display:block;box-sizing:border-box;height:250px;padding:22px 26px;text-decoration:none;">
            <span style="display:block;text-decoration:none;font-family:'Gill Sans','Gill Sans MT',Calibri,Arial,sans-serif;font-weight:700;font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:#9a948c;margin:0 0 7px;">{{TILE_2_EYEBROW}}</span>
            <span style="display:block;text-decoration:none;font-family:Georgia,'Times New Roman',serif;font-size:19px;color:#2c2825;line-height:1.3;margin:0 0 8px;">{{TILE_2_TITLE}}</span>
            <span style="display:block;text-decoration:none;font-family:'Gill Sans','Gill Sans MT',Calibri,Arial,sans-serif;font-size:12px;color:#6b655e;line-height:1.55;margin:0 0 12px;">{{TILE_2_TEASER}}</span>
            <span style="text-decoration:none;font-family:'Gill Sans','Gill Sans MT',Calibri,Arial,sans-serif;font-weight:700;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#2c2825;">Read the piece &rarr;</span>
          </a>
        </td>
      </tr></table>
    </td></tr>
    <!-- TILE 3 — optional: dropped by the conditional-section pass when TILE_3_IMAGE_URL is "" -->
    {{#TILE_3_IMAGE_URL}}
    <tr><td class="jt-row" style="padding:7px 28px;">
      <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background:#ffffff;border:1px solid #e8e2da;"><tr>
        <td class="jt-img" width="200" valign="top" style="width:200px;padding:0;overflow:hidden;vertical-align:top;">
          <a href="{{TILE_3_LINK_URL}}" style="display:block;text-decoration:none;">
            <img src="{{TILE_3_IMAGE_URL}}" width="200" height="250" alt="" style="display:block;width:200px;height:250px;object-fit:cover;object-position:center top;border:0;">
          </a>
        </td>
        <td class="jt-txt" valign="top" style="padding:0;height:250px;vertical-align:top;">
          <a class="jt-txt-link" href="{{TILE_3_LINK_URL}}" style="display:block;box-sizing:border-box;height:250px;padding:22px 26px;text-decoration:none;">
            <span style="display:block;text-decoration:none;font-family:'Gill Sans','Gill Sans MT',Calibri,Arial,sans-serif;font-weight:700;font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:#9a948c;margin:0 0 7px;">{{TILE_3_EYEBROW}}</span>
            <span style="display:block;text-decoration:none;font-family:Georgia,'Times New Roman',serif;font-size:19px;color:#2c2825;line-height:1.3;margin:0 0 8px;">{{TILE_3_TITLE}}</span>
            <span style="display:block;text-decoration:none;font-family:'Gill Sans','Gill Sans MT',Calibri,Arial,sans-serif;font-size:12px;color:#6b655e;line-height:1.55;margin:0 0 12px;">{{TILE_3_TEASER}}</span>
            <span style="text-decoration:none;font-family:'Gill Sans','Gill Sans MT',Calibri,Arial,sans-serif;font-weight:700;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#2c2825;">Read the piece &rarr;</span>
          </a>
        </td>
      </tr></table>
    </td></tr>
    {{/TILE_3_IMAGE_URL}}
    <tr><td style="font-size:0;line-height:0;height:22px;">&nbsp;</td></tr>
  </table>
</td></tr>

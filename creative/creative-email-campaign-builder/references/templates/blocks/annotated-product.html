<!-- COMPONENT: blocks/annotated-product | DESIGNED BLOCK — PRODUCT PHOTO + HAND-DRAWN CALLOUT CHIPS (DRAFT — pending design review)
TOKENS:
  {{PRODUCT_IMAGE_URL}} — product photo (4:5 crop, 300×375px display)
  {{PRODUCT_LABEL}}     — NeuzeitGro Bold caps micro-label (e.g. "SPOTLIGHT")
  {{PRODUCT_NAME}}      — Lust display name — SENTENCE CASE (e.g. "Osaka")
  {{PRODUCT_OCCASION}}  — NeuzeitGro Light one-liner
  {{PRODUCT_PRICE}}     — Lust price (e.g. "$89")
  {{CHIP_1_TEXT}}       — Cervanttis callout chip — MUST be lowercase (e.g. "locally grown")
  {{CHIP_2_TEXT}}       — Cervanttis callout chip — MUST be lowercase (e.g. "lasts 10+ days")
  {{CHIP_3_TEXT}}       — Cervanttis callout chip — MUST be lowercase (e.g. "hand-tied")
  {{CTA_TEXT}}          — button label
  {{CTA_URL}}           — button href
  {{ROTATION}}          — ROTATION lever: "flat" / "subtle" / "jaunty" chip tilt. Locked to these three.
  PALETTE TOKENS (copy ONE preset row verbatim — never invent hex):
  {{PANEL_BG}} {{PANEL_TEXT}} {{PANEL_SUB}} {{PANEL_BORDER}}
RULES:
  - DRAFT — pending design review. Not ship-ready; for a designer to assess.
  - DESIGNED BLOCK: slice to PNG. The rotated, overlapping callout chips (transform:rotate +
    position:absolute + box-shadow) do not survive as live email HTML.
  - CHIP_*_TEXT are Cervanttis → lowercase; PRODUCT_NAME is Lust → sentence case.
  - Locked Noir/Clay/White palette + locked fonts. Max one annotated-product per email.
PALETTE PRESETS (copy one row verbatim into the four PANEL_* tokens):
  white :  PANEL_BG=#ffffff  PANEL_TEXT=#666666  PANEL_SUB=#aaaaaa  PANEL_BORDER=#e8e2da
  clay  :  PANEL_BG=#D8CCBE  PANEL_TEXT=#000000  PANEL_SUB=#5f574d  PANEL_BORDER=#c7b9a9
  50clay:  PANEL_BG=#EBE5DF  PANEL_TEXT=#666666  PANEL_SUB=#8a8178  PANEL_BORDER=#ded7cf
  noir  :  PANEL_BG=#000000  PANEL_TEXT=#cfcac3  PANEL_SUB=#888888  PANEL_BORDER=#2c2825   (swap button to #fff/#000)
  PRODUCT_NAME and PRODUCT_PRICE render in the brand extreme: #000000 on light presets, #ffffff on noir.
-->
<tr><td style="padding:0;background:{{PANEL_BG}};border-top:1px solid {{PANEL_BORDER}};">
<style>
  .ap .ap-chip1 { transform:rotate(-5deg); }
  .ap .ap-chip2 { transform:rotate(4deg); }
  .ap .ap-chip3 { transform:rotate(-3deg); }
  .ap.rot-flat .ap-chip1, .ap.rot-flat .ap-chip2, .ap.rot-flat .ap-chip3 { transform:rotate(0deg); }
  .ap.rot-subtle .ap-chip1 { transform:rotate(-3deg); }
  .ap.rot-subtle .ap-chip2 { transform:rotate(2deg); }
  .ap.rot-subtle .ap-chip3 { transform:rotate(-2deg); }
  .ap.rot-jaunty .ap-chip1 { transform:rotate(-9deg); }
  .ap.rot-jaunty .ap-chip2 { transform:rotate(7deg); }
  .ap.rot-jaunty .ap-chip3 { transform:rotate(-6deg); }
</style>
<table width="600" cellpadding="0" cellspacing="0" border="0" class="ap rot-{{ROTATION}}">
  <tr>
    <!-- Product image column with overlapping callout chips -->
    <td width="340" valign="middle" align="center" style="width:340px;padding:48px 0 48px 36px;vertical-align:middle;">
      <div style="position:relative;display:inline-block;">
        <img src="{{PRODUCT_IMAGE_URL}}" width="300" height="375" alt="{{PRODUCT_NAME}}" style="display:block;width:300px;height:375px;object-fit:cover;object-position:center;border:1px solid {{PANEL_BORDER}};">
        <!-- chips: hand-written Cervanttis on a white pill, tilted -->
        <div class="ap-chip1" style="position:absolute;left:-22px;top:40px;background:#ffffff;border:1px solid #000000;font-family:'Cervanttis','Palatino Linotype',Palatino,Georgia,serif;font-weight:400;font-style:normal;font-synthesis:none;-webkit-font-smoothing:antialiased;font-size:18px;color:#000000;line-height:1.0;padding:6px 14px;box-shadow:0 6px 14px rgba(0,0,0,0.18);">{{CHIP_1_TEXT}}</div>
        <div class="ap-chip2" style="position:absolute;right:-26px;top:150px;background:#ffffff;border:1px solid #000000;font-family:'Cervanttis','Palatino Linotype',Palatino,Georgia,serif;font-weight:400;font-style:normal;font-synthesis:none;-webkit-font-smoothing:antialiased;font-size:18px;color:#000000;line-height:1.0;padding:6px 14px;box-shadow:0 6px 14px rgba(0,0,0,0.18);">{{CHIP_2_TEXT}}</div>
        <div class="ap-chip3" style="position:absolute;left:-14px;bottom:42px;background:#ffffff;border:1px solid #000000;font-family:'Cervanttis','Palatino Linotype',Palatino,Georgia,serif;font-weight:400;font-style:normal;font-synthesis:none;-webkit-font-smoothing:antialiased;font-size:18px;color:#000000;line-height:1.0;padding:6px 14px;box-shadow:0 6px 14px rgba(0,0,0,0.18);">{{CHIP_3_TEXT}}</div>
      </div>
    </td>
    <!-- Detail column -->
    <td valign="middle" style="padding:48px 36px 48px 24px;vertical-align:middle;">
      <p style="font-family:'NeuzeitGro','Gill Sans','Gill Sans MT',Calibri,sans-serif;font-weight:700;font-size:9px;letter-spacing:.20em;text-transform:uppercase;color:{{PANEL_SUB}};margin:0 0 10px 0;">{{PRODUCT_LABEL}}</p>
      <h2 style="font-family:'Lust',Georgia,'Times New Roman',serif;font-weight:normal;font-style:normal;font-size:30px;color:#000000;line-height:1.1;margin:0 0 8px 0;">{{PRODUCT_NAME}}</h2>
      <p style="font-family:'NeuzeitGro','Gill Sans','Gill Sans MT',Calibri,sans-serif;font-weight:300;font-size:13px;color:{{PANEL_TEXT}};line-height:1.65;margin:0 0 18px 0;">{{PRODUCT_OCCASION}}</p>
      <p style="font-family:'Lust',Georgia,'Times New Roman',serif;font-weight:normal;font-style:normal;font-size:22px;color:#000000;letter-spacing:.04em;margin:0 0 22px 0;">{{PRODUCT_PRICE}}</p>
      <a href="{{CTA_URL}}" style="font-family:'NeuzeitGro','Gill Sans','Gill Sans MT',Calibri,sans-serif;font-weight:700;font-size:10px;letter-spacing:.16em;text-transform:uppercase;background:#000000;color:#ffffff;text-decoration:none;padding:14px 40px;display:inline-block;">{{CTA_TEXT}}</a>
    </td>
  </tr>
</table>
</td></tr>

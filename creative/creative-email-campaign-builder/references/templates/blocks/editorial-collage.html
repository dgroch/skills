<!-- COMPONENT: blocks/editorial-collage | DESIGNED BLOCK — LAYERED TILTED FRAMES + PULL-QUOTE (DRAFT — pending design review)
TOKENS:
  {{FRAME_1_URL}}     — back-left frame photo (square crop, 196×232px display)
  {{FRAME_2_URL}}     — back-right frame photo (square crop, 196×232px display)
  {{FRAME_3_URL}}     — front/centre frame photo (220×264px display)
  {{SUPER_LABEL}}     — NeuzeitGro Bold caps micro-label (e.g. "THE EDIT")
  {{ACCENT_SCRIPT}}   — Cervanttis script accent — MUST be lowercase (e.g. "this month,")
  {{PULL_QUOTE}}      — Lust pull-quote — SENTENCE CASE (~14 words)
  {{CTA_TEXT}}        — button label
  {{CTA_URL}}         — button href
  {{ROTATION}}        — ROTATION lever: "flat" / "subtle" / "jaunty" frame tilt. Locked to these three.
  PALETTE TOKENS (copy ONE preset row verbatim — never invent hex):
  {{PANEL_BG}} {{PANEL_TEXT}} {{PANEL_SUB}} {{PANEL_BORDER}}
RULES:
  - DRAFT — pending design review. Not ship-ready; for a designer to assess.
  - DESIGNED BLOCK: slice to PNG. Three overlapping, tilted frames (transform:rotate +
    position:absolute) and the layered pull-quote do not survive as live email HTML.
  - ACCENT_SCRIPT is Cervanttis → lowercase; PULL_QUOTE is Lust → sentence case.
  - Locked Noir/Clay/White palette + locked fonts. Max one collage block per email.
  - The collage region is a fixed height so the absolutely-positioned frames are captured.
PALETTE PRESETS (copy one row verbatim into the four PANEL_* tokens):
  white :  PANEL_BG=#ffffff  PANEL_TEXT=#444444  PANEL_SUB=#aaaaaa  PANEL_BORDER=#e8e2da
  clay  :  PANEL_BG=#D8CCBE  PANEL_TEXT=#000000  PANEL_SUB=#5f574d  PANEL_BORDER=#c7b9a9
  50clay:  PANEL_BG=#EBE5DF  PANEL_TEXT=#444444  PANEL_SUB=#8a8178  PANEL_BORDER=#ded7cf
  noir  :  PANEL_BG=#000000  PANEL_TEXT=#cfcac3  PANEL_SUB=#888888  PANEL_BORDER=#2c2825   (swap button to #fff/#000)
  PULL_QUOTE renders in the brand extreme: #000000 on light presets, #ffffff on noir.
-->
<tr><td style="padding:0;background:{{PANEL_BG}};border-top:1px solid {{PANEL_BORDER}};">
<style>
  .ec .ec-f1 { transform:rotate(-6deg); }
  .ec .ec-f2 { transform:rotate(5deg); }
  .ec .ec-f3 { transform:rotate(-2deg); }
  .ec.rot-flat .ec-f1 { transform:rotate(-2deg); }
  .ec.rot-flat .ec-f2 { transform:rotate(2deg); }
  .ec.rot-flat .ec-f3 { transform:rotate(0deg); }
  .ec.rot-subtle .ec-f1 { transform:rotate(-4deg); }
  .ec.rot-subtle .ec-f2 { transform:rotate(3deg); }
  .ec.rot-subtle .ec-f3 { transform:rotate(-1deg); }
  .ec.rot-jaunty .ec-f1 { transform:rotate(-9deg); }
  .ec.rot-jaunty .ec-f2 { transform:rotate(8deg); }
  .ec.rot-jaunty .ec-f3 { transform:rotate(-3deg); }
</style>
<table width="600" cellpadding="0" cellspacing="0" border="0" class="ec rot-{{ROTATION}}">
  <tr>
    <td style="padding:44px 0 8px;background:{{PANEL_BG}};">
      <!-- Collage region — fixed height so absolute frames are captured -->
      <div style="position:relative;width:600px;height:300px;">
        <!-- back-left frame -->
        <div class="ec-f1" style="position:absolute;left:78px;top:34px;background:#ffffff;border:1px solid #e8e2da;padding:9px;box-shadow:0 10px 26px rgba(0,0,0,0.18);">
          <img src="{{FRAME_1_URL}}" width="196" height="232" alt="" style="display:block;width:196px;height:232px;object-fit:cover;object-position:center;">
        </div>
        <!-- back-right frame -->
        <div class="ec-f2" style="position:absolute;left:330px;top:42px;background:#ffffff;border:1px solid #e8e2da;padding:9px;box-shadow:0 10px 26px rgba(0,0,0,0.18);">
          <img src="{{FRAME_2_URL}}" width="196" height="232" alt="" style="display:block;width:196px;height:232px;object-fit:cover;object-position:center;">
        </div>
        <!-- front/centre frame -->
        <div class="ec-f3" style="position:absolute;left:190px;top:18px;background:#ffffff;border:1px solid #e8e2da;padding:11px;box-shadow:0 16px 36px rgba(0,0,0,0.24);z-index:2;">
          <img src="{{FRAME_3_URL}}" width="220" height="264" alt="" style="display:block;width:220px;height:264px;object-fit:cover;object-position:center;">
        </div>
      </div>
      <!-- Pull-quote -->
      <div style="padding:6px 72px 46px;text-align:center;">
        <p style="font-family:'NeuzeitGro','Gill Sans','Gill Sans MT',Calibri,sans-serif;font-weight:700;font-size:9px;letter-spacing:.20em;text-transform:uppercase;color:{{PANEL_SUB}};margin:0 0 12px 0;">{{SUPER_LABEL}}</p>
        <p style="font-family:'Cervanttis','Palatino Linotype',Palatino,Georgia,serif;font-weight:400;font-style:normal;font-synthesis:none;-webkit-font-smoothing:antialiased;font-size:28px;color:{{PANEL_SUB}};line-height:1.0;margin:0 0 10px 0;">{{ACCENT_SCRIPT}}</p>
        <p style="font-family:'Lust',Georgia,'Times New Roman',serif;font-weight:normal;font-style:normal;font-size:26px;color:#000000;line-height:1.35;max-width:440px;margin:0 auto 22px auto;">{{PULL_QUOTE}}</p>
        <a href="{{CTA_URL}}" style="font-family:'NeuzeitGro','Gill Sans','Gill Sans MT',Calibri,sans-serif;font-weight:700;font-size:10px;letter-spacing:.16em;text-transform:uppercase;background:#000000;color:#ffffff;text-decoration:none;padding:14px 40px;display:inline-block;">{{CTA_TEXT}}</a>
      </div>
    </td>
  </tr>
</table>
</td></tr>

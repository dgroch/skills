<!-- COMPONENT: sections/section-headline | SUPER LABEL + LUST HEADLINE
TOKENS:
  {{SUPER_LABEL}}  — small uppercase label
  {{HEADLINE}}     — Lust headline (font-weight:normal locked)
-->
<tr><td>
<table width="600" cellpadding="0" cellspacing="0" border="0" style="border-top:1px solid #e8e2da;">
  <tr>
    <td class="sp" align="center" style="padding:40px 48px 28px;background:#ffffff;text-align:center;">
      <p style="font-family:'NeuzeitGro','Gill Sans','Gill Sans MT',Calibri,sans-serif;font-weight:700;font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:#aaaaaa;margin:0 0 14px 0;">{{SUPER_LABEL}}</p>
      <h2 class="sh" style="font-family:'Lust',Georgia,'Times New Roman',serif;font-weight:normal;font-style:normal;font-size:28px;color:#000000;line-height:1.2;margin:0;">{{HEADLINE}}</h2>
    </td>
  </tr>
</table>
</td></tr>

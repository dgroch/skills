<!-- COMPONENT: sections/three-column-steps | NUMBERED STEPS — 3 COLUMNS
TOKENS:
  {{HEADLINE}}       — Lust font — SENTENCE CASE (e.g. "Create a Moonpig Card in Minutes")
  {{STEP_1_NUMBER}}  — e.g. "1."
  {{STEP_1_TEXT}}    — Step 1 description (NeuzeitGro Light)
  {{STEP_2_NUMBER}}  — e.g. "2."
  {{STEP_2_TEXT}}    — Step 2 description
  {{STEP_3_NUMBER}}  — e.g. "3."
  {{STEP_3_TEXT}}    — Step 3 description
  {{CTA_TEXT}}       — Button label (e.g. "Shop Now")
  {{CTA_URL}}        — Button href
  {{BG_COLOR}}       — Background colour (default: #faf5f0)
  {{ACCENT_COLOR}}   — Heading + number colour (default: #1a2244)
RULES:
  - Headline uses Lust font — MUST be sentence case.
  - Numbers use Lust font at large size for visual hierarchy.
  - Step text uses NeuzeitGro Light.
  - Three equal-width columns (each 168px inside padding).
  - HTML-safe classification — no slicing required.
  - BG_COLOR and ACCENT_COLOR are configurable; defaults give warm off-white bg with navy accent.
-->
<tr><td>
<table width="600" cellpadding="0" cellspacing="0" border="0" bgcolor="{{BG_COLOR}}">
  <tr>
    <td align="center" style="padding:48px 32px 16px;background:{{BG_COLOR}};">
      <h2 class="sh" style="font-family:'Lust',Georgia,'Times New Roman',serif;font-weight:normal;font-style:normal;font-size:26px;color:{{ACCENT_COLOR}};line-height:1.2;margin:0 0 36px 0;text-align:center;">{{HEADLINE}}</h2>
    </td>
  </tr>
  <tr>
    <td align="center" style="padding:0 24px 8px;background:{{BG_COLOR}};">
      <!-- 3-column table — must use table layout for Outlook compatibility -->
      <table width="552" cellpadding="0" cellspacing="0" border="0" role="presentation">
        <tr>
          <!-- Step 1 -->
          <td width="168" valign="top" align="center" style="padding:0 12px 32px;">
            <p style="font-family:'Lust',Georgia,'Times New Roman',serif;font-weight:normal;font-style:normal;font-size:40px;color:{{ACCENT_COLOR}};margin:0 0 12px 0;line-height:1;">{{STEP_1_NUMBER}}</p>
            <p style="font-family:'NeuzeitGro','Gill Sans','Gill Sans MT',Calibri,sans-serif;font-weight:300;font-size:13px;color:#444444;line-height:1.65;margin:0;text-align:center;">{{STEP_1_TEXT}}</p>
          </td>
          <!-- Step 2 -->
          <td width="168" valign="top" align="center" style="padding:0 12px 32px;">
            <p style="font-family:'Lust',Georgia,'Times New Roman',serif;font-weight:normal;font-style:normal;font-size:40px;color:{{ACCENT_COLOR}};margin:0 0 12px 0;line-height:1;">{{STEP_2_NUMBER}}</p>
            <p style="font-family:'NeuzeitGro','Gill Sans','Gill Sans MT',Calibri,sans-serif;font-weight:300;font-size:13px;color:#444444;line-height:1.65;margin:0;text-align:center;">{{STEP_2_TEXT}}</p>
          </td>
          <!-- Step 3 -->
          <td width="168" valign="top" align="center" style="padding:0 12px 32px;">
            <p style="font-family:'Lust',Georgia,'Times New Roman',serif;font-weight:normal;font-style:normal;font-size:40px;color:{{ACCENT_COLOR}};margin:0 0 12px 0;line-height:1;">{{STEP_3_NUMBER}}</p>
            <p style="font-family:'NeuzeitGro','Gill Sans','Gill Sans MT',Calibri,sans-serif;font-weight:300;font-size:13px;color:#444444;line-height:1.65;margin:0;text-align:center;">{{STEP_3_TEXT}}</p>
          </td>
        </tr>
      </table>
    </td>
  </tr>
  <tr>
    <td align="center" style="padding:0 32px 48px;background:{{BG_COLOR}};">
      <a href="{{CTA_URL}}" style="font-family:'NeuzeitGro','Gill Sans','Gill Sans MT',Calibri,sans-serif;font-weight:700;font-size:10px;letter-spacing:.16em;text-transform:uppercase;background:{{ACCENT_COLOR}};color:#ffffff;text-decoration:none;padding:14px 40px;display:inline-block;">{{CTA_TEXT}}</a>
    </td>
  </tr>
</table>
</td></tr>

<!-- COMPONENT: heroes/hero-b-white | TEXT ABOVE IMAGE — #FFFFFF BAND
TOKENS:
  {{SUPER_LABEL}}    — e.g. "Mother's Day · Gifting"
  {{HEADLINE}}        — Cervanttis font — MUST be lowercase (e.g. "for the one who does it all")
  {{SUBHEADLINE}}    — supporting copy
  {{CTA_TEXT}}       — button label
  {{CTA_URL}}        — button href
  {{HERO_IMAGE_URL}} — full-bleed lifestyle photo below band (600×360px display)
RULES:
  - Band colour, illustration, text colours are locked
  - Headline MUST be lowercase in token value
  - Photo below band has no overlay — let it breathe
-->
<tr><td>
<!-- Header for this hero variant — shows band colour in header too -->
<table width="600" cellpadding="0" cellspacing="0" border="0">
  <tr>
    <td align="center" style="padding:28px 24px 22px;background:#ffffff;border-bottom:1px solid #e8e2da;">
      <img src="https://cdn.shopify.com/s/files/1/0657/8723/2489/files/F_B_Logo_Horizontal_BLK_914x200_0eb09d11-e91b-4f05-8ef4-9e54a99cb903.png" width="120" height="24" alt="Fig &amp; Bloom" style="width:120px;height:24px;display:inline-block;">
    </td>
  </tr>
</table>
<!-- Text band -->
<table width="600" cellpadding="0" cellspacing="0" border="0">
  <tr>
    <td class="sp" align="center" valign="middle" style="background:#ffffff;padding:48px 64px 44px;text-align:center;position:relative;overflow:hidden;min-height:280px;">
      <!-- Illustration: bottom-right, 220px wide, base bleeds off bottom -->
      <img src="{{ASSETS_BASE}}/BodyFlower_White_wide.png" width="220" alt="" style="position:absolute;right:0;bottom:-30px;width:220px;height:auto;opacity:0.20;display:block;">
      <p style="font-family:'NeuzeitGro','Gill Sans','Gill Sans MT',Calibri,sans-serif;font-weight:700;font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:#aaaaaa;margin:0 0 18px 0;position:relative;z-index:1;">{{SUPER_LABEL}}</p>
      <h1 class="hh" style="font-family:'Cervanttis','Palatino Linotype',Palatino,Georgia,serif;font-weight:400;font-style:normal;font-synthesis:none;-webkit-font-smoothing:antialiased;font-size:52px;color:#000000;line-height:1.0;margin:0 0 18px 0;position:relative;z-index:1;">{{HEADLINE}}</h1>
      <p style="font-family:'NeuzeitGro','Gill Sans','Gill Sans MT',Calibri,sans-serif;font-weight:300;font-size:13px;color:#444444;max-width:340px;margin:0 auto 28px auto;line-height:1.75;position:relative;z-index:1;">{{SUBHEADLINE}}</p>
      <a href="{{CTA_URL}}" style="font-family:'NeuzeitGro','Gill Sans','Gill Sans MT',Calibri,sans-serif;font-weight:700;font-size:10px;letter-spacing:.16em;text-transform:uppercase;background:#000000;color:#ffffff;text-decoration:none;padding:14px 40px;display:inline-block;position:relative;z-index:1;">{{CTA_TEXT}}</a>
    </td>
  </tr>
</table>
<!-- Full-bleed photo — no overlay -->
<table width="600" cellpadding="0" cellspacing="0" border="0">
  <tr>
    <td style="padding:0;overflow:hidden;">
      <img src="{{HERO_IMAGE_URL}}" width="600" height="360" alt="" style="display:block;width:600px;max-width:600px;height:360px;object-fit:cover;object-position:center;">
    </td>
  </tr>
</table>
</td></tr>
